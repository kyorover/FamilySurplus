# .github/workflows/deploy.yml
name: AWS CDK Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ対象の環境を選択してください (dev または prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write # OIDC認証に必須
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 手動実行時の入力（environment）に基づく環境変数の出し分けロジック
    env:
      TARGET_ENV: ${{ inputs.environment }}
      # 以下はAWS側で事前に作成したOIDC用RoleのARNをGitHub Secretsへ設定して使用
      AWS_ROLE_ARN: ${{ inputs.environment == 'prod' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'hesokuri-backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./hesokuri-backend
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: CDK Deploy
        working-directory: ./hesokuri-backend
        run: npx cdk deploy --require-approval never -c env=${{ env.TARGET_ENV }}