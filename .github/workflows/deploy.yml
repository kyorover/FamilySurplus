# .github/workflows/deploy.yml
name: AWS CDK Deployment

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'hesokuri-backend/**' # バックエンドの変更時のみ発火

permissions:
  id-token: write # OIDC認証に必須
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 環境変数の出し分けロジック
    env:
      TARGET_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      # 以下はAWS側で事前に作成したOIDC用RoleのARNをGitHub Secretsへ設定して使用
      AWS_ROLE_ARN: ${{ github.ref == 'refs/heads/main' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'hesokuri-backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./hesokuri-backend
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: CDK Diff
        working-directory: ./hesokuri-backend
        run: npx cdk diff -c env=${{ env.TARGET_ENV }}

      - name: CDK Deploy
        working-directory: ./hesokuri-backend
        # --require-approval never は自動実行に必須
        run: npx cdk deploy -c env=${{ env.TARGET_ENV }} --require-approval never